# grom.seg.br - Grom.Seg unified application
server {
    listen 80;
    server_name grom.seg.br;

    root /var/www/grom.seg.br/public;
    index index.php index.html;

    limit_req zone=general burst=20 nodelay;
    limit_conn connlimit 10;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /server/ {
        allow 10.0.1.0/24;
        allow 10.0.10.0/24;
        deny all;
        try_files $uri $uri/ =404;
    }

    location ~ ^/(login|admin|api/auth) {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /documental/ {
        proxy_pass http://unix:/run/grom-documental.sock:/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_intercept_errors on;
    }

    location ~ /\.(ht|env|git|svn) { deny all; return 404; }
    location ~ /\.(sql|bak|old|orig|swp|log) { deny all; return 404; }

    access_log /var/log/nginx/grom.seg.br.access.log main;
    error_log /var/log/nginx/grom.seg.br.error.log;
}
