# docs.grom.seg.br - Grom Documental (Python/FastAPI)
server {
    listen 80;
    server_name docs.grom.seg.br;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;
    limit_conn connlimit 10;

    # Proxy para Gunicorn/Uvicorn
    location / {
        proxy_pass http://unix:/run/grom-documental.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # API com rate limiting específico
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://unix:/run/grom-documental.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Arquivos estáticos servidos diretamente pelo Nginx
    location /static/ {
        alias /var/www/docs.grom.seg.br/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Upload de documentos
    location /api/upload {
        limit_req zone=login burst=3 nodelay;
        client_max_body_size 100M;
        proxy_pass http://unix:/run/grom-documental.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    access_log /var/log/nginx/docs.grom.seg.br.access.log main;
    error_log /var/log/nginx/docs.grom.seg.br.error.log;
}
