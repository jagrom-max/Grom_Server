# web.grom.seg.br - Grom_web (PHP Application)
server {
    listen 80;
    server_name web.grom.seg.br;

    root /var/www/web.grom.seg.br/public;
    index index.php index.html;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;
    limit_conn connlimit 10;

    # Aplicação PHP
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_intercept_errors on;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Login com rate limiting mais restritivo
    location ~ ^/(login|admin|api/auth) {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\.(ht|env|git|svn) { deny all; return 404; }
    location ~ /\.(sql|bak|old|orig|swp|log) { deny all; return 404; }
    location ~ ^/(composer\.|package\.json|webpack) { deny all; return 404; }

    # Cache de assets estáticos
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    access_log /var/log/nginx/web.grom.seg.br.access.log main;
    error_log /var/log/nginx/web.grom.seg.br.error.log;
}
